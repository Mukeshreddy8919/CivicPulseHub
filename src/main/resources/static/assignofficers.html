<body>
    <div class="shell">
        <div class="top">
            <div>
                <div class="title">Assign Officers</div>
                <div class="sub">Dedicated admin queue for assignment and prioritization</div>
            </div>
            <a class="btn-link" href="/dashboard.html">Back to Dashboard</a>
        </div>

        <div class="toolbar">
            <input id="search" placeholder="Search by title, citizen, officer..."/>
            <select id="status">
                <option value="">All Statuses</option>
                <option value="PENDING">Pending</option>
                <option value="IN_PROGRESS">In Progress</option>
            </select>
            <select id="priority">
                <option value="">All Priorities</option>
                <option value="CRITICAL">Critical</option>
                <option value="HIGH">High</option>
                <option value="MEDIUM">Medium</option>
                <option value="LOW">Low</option>
            </select>
            <select id="category">
                <option value="">All Categories</option>
                <option value="WATER">Water</option>
                <option value="STREET_LIGHT">Street Light</option>
                <option value="ROAD">Road</option>
                <option value="SANITATION">Sanitation</option>
                <option value="DRAINAGE">Drainage</option>
                <option value="PARK">Park</option>
                <option value="ELECTRICITY">Electricity</option>
                <option value="OTHER">Other</option>
            </select>
            <button class="btn btn-primary" onclick="reload(0)">Apply</button>
        </div>

        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Title</th>
                        <th class="hide-sm">Citizen</th>
                        <th>Status</th>
                        <th class="hide-sm">Priority</th>
                        <th>Assign</th>
                    </tr>
                </thead>
                <tbody id="rows">
                    <tr><td colspan="6" class="msg">Loading queue...</td></tr>
                </tbody>
            </table>
        </div>

        <div class="pager">
            <div id="meta">-</div>
            <div class="pager-controls">
                <button onclick="prevPage()">Prev</button>
                <button onclick="nextPage()">Next</button>
            </div>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('civicpulse_token');
        const userStr = localStorage.getItem('civicpulse_user');
        if (!token || !userStr) window.location.href = '/index.html';
        const user = JSON.parse(userStr);
        if (user.role !== 'ADMIN') window.location.href = '/dashboard.html';

        let officers = [];
        let page = 0;
        let totalPages = 0;
        const size = 10;

        async function loadOfficers() {
            const res = await fetch('/api/grievances/officers', {
                headers: { Authorization: 'Bearer ' + token }
            });
            officers = res.ok ? await res.json() : [];
        }

        function queryString(targetPage) {
            const params = new URLSearchParams();
            params.set('page', String(targetPage));
            params.set('size', String(size));
            const status = document.getElementById('status').value;
            const priority = document.getElementById('priority').value;
            const category = document.getElementById('category').value;
            const search = document.getElementById('search').value.trim();
            if (status) params.set('status', status);
            if (priority) params.set('priority', priority);
            if (category) params.set('category', category);
            if (search) params.set('search', search);
            return params.toString();
        }

        function officerOptions(selected) {
            const extra = selected && !officers.includes(selected) ? [selected] : [];
            return ['<option value="">Unassigned</option>']
                .concat(extra.concat(officers).map(name => `<option value="${name}" ${selected === name ? 'selected' : ''}>${name}</option>`))
                .join('');
        }

        async function reload(targetPage) {
            const rows = document.getElementById('rows');
            rows.innerHTML = '<tr><td colspan="6" class="msg">Loading queue...</td></tr>';

            const res = await fetch('/api/grievances/admin/list?' + queryString(targetPage), {
                headers: { Authorization: 'Bearer ' + token }
            });

            if (!res.ok) {
                rows.innerHTML = '<tr><td colspan="6" class="msg">Failed to load grievances.</td></tr>';
                return;
            }

            const data = await res.json();
            page = data.page;
            totalPages = data.totalPages;
            document.getElementById('meta').textContent = `Page ${page + 1} of ${Math.max(totalPages, 1)} | ${data.totalElements} total`;

            if (!data.content || data.content.length === 0) {
                rows.innerHTML = '<tr><td colspan="6" class="msg">No grievances in this filter.</td></tr>';
                return;
            }

            rows.innerHTML = data.content.map(g => {
                const statusClass = g.status === 'IN_PROGRESS' ? 'progress' : 'pending';
                return `
                    <tr>
                        <td>#${g.id}</td>
                        <td>${g.title}</td>
                        <td class="hide-sm">${g.citizenUsername}</td>
                        <td><span class="badge ${statusClass}">${g.status.replace('_',' ')}</span></td>
                        <td class="hide-sm">${g.priority || 'MEDIUM'}</td>
                        <td>
                            <div class="actions">
                                <select id="officer-${g.id}">${officerOptions(g.assignedOfficer || '')}</select>
                                <select id="priority-${g.id}">
                                    <option value="LOW" ${g.priority === 'LOW' ? 'selected' : ''}>LOW</option>
                                    <option value="MEDIUM" ${(!g.priority || g.priority === 'MEDIUM') ? 'selected' : ''}>MEDIUM</option>
                                    <option value="HIGH" ${g.priority === 'HIGH' ? 'selected' : ''}>HIGH</option>
                                    <option value="CRITICAL" ${g.priority === 'CRITICAL' ? 'selected' : ''}>CRITICAL</option>
                                </select>
                                <button class="assign-btn" onclick="assign(${g.id})">Save</button>
                            </div>
                        </td>
                    </tr>`;
            }).join('');
        }

        async function assign(id) {
            const assignedOfficer = document.getElementById(`officer-${id}`).value;
            const priority = document.getElementById(`priority-${id}`).value;

            const body = {
                grievanceId: id,
                assignedOfficer,
                priority,
                status: assignedOfficer ? 'IN_PROGRESS' : 'PENDING'
            };

            const res = await fetch('/api/grievances/admin/assign', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    Authorization: 'Bearer ' + token
                },
                body: JSON.stringify(body)
            });

            if (!res.ok) {
                alert('Assignment failed.');
                return;
            }

            await reload(page);
        }

        function prevPage() {
            if (page > 0) reload(page - 1);
        }
        function nextPage() {
            if (page + 1 < totalPages) reload(page + 1);
        }

        (async function init() {
            await loadOfficers();
            await reload(0);
        })();
    </script>
